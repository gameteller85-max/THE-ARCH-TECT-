<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efsanevi Karşılaşma v2.3 - Shinra Tensei</title>
</head>
<body>

<div id="rinnegan-bg"></div>

<div class="vs-box">
    <h2>⚔️ Efsanevi Karşılaşma</h2>

    <div class="selection-area">
        <select id="char1"></select>
        <span style="color: white; font-weight: bold; margin: 0 10px;">VS</span>
        <select id="char2"></select>
    </div>

    <br>

    <button id="fightBtn" onclick="fight()">SAVAŞ BAŞLAT</button>

    <p id="result">Karakterini seç ve savaşı başlat!</p>
</div>

<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

<style>
    * { box-sizing: border-box; }
    
    body {
        background-color: #0d0d0d;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        transition: background 0.5s;
    }

    /* RİNNEGAN EFEKTİ - BU SEFER DAHA NET VE GÖRÜNÜR */
    #rinnegan-bg {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300vw;
        height: 300vh;
        /* Daha koyu ve keskin mor halkalar */
        background: repeating-radial-gradient(
            circle,
            #1a0d26 0%,
            #1a0d26 10%,
            #4b3d61 11%,
            #4b3d61 12%,
            #1a0d26 13%
        );
        opacity: 0; /* Başlangıçta gizli */
        z-index: -1;
        transition: opacity 0.5s ease-in-out;
    }

    .vs-box {
        background: #1a1a1a;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        width: 90%;
        max-width: 450px;
        box-shadow: 0 0 30px rgba(0,0,0,1);
        border: 2px solid #333;
        z-index: 10;
    }

    h2 { color: #fff; margin-bottom: 25px; }

    .selection-area {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
    }

    select {
        padding: 12px;
        background: #333;
        color: white;
        border: 1px solid #555;
        border-radius: 8px;
        width: 42%;
    }

    button {
        background: #ff4444;
        color: white;
        padding: 15px;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        width: 100%;
        cursor: pointer;
    }

    #result {
        margin-top: 30px;
        color: #eee;
        font-size: 20px;
        font-weight: bold;
    }

    /* KAZANAN PARLAMASI */
    .win-text {
        color: #ffcc00 !important;
        text-shadow: 0 0 20px #ffcc00;
    }

    /* SARSILMA EFEKTİ */
    .shake {
        animation: shake 0.4s;
    }
    @keyframes shake {
        0% { transform: translate(1px, 1px); }
        50% { transform: translate(-3px, 2px); }
        100% { transform: translate(0, 0); }
    }
</style>

<script>
    const characters = [
        { name: "Naruto", power: 92, speed: 88, iq: 75 },
        { name: "Itachi", power: 85, speed: 92, iq: 98 },
        { name: "Sasuke", power: 90, speed: 90, iq: 88 },
        { name: "Pain", power: 95, speed: 82, iq: 90 }
    ];

    const s1 = document.getElementById("char1");
    const s2 = document.getElementById("char2");
    const resultEl = document.getElementById("result");
    const rinnegan = document.getElementById("rinnegan-bg");
    const box = document.querySelector(".vs-box");

    function init() {
        characters.forEach((char, index) => {
            s1.add(new Option(char.name, index));
            s2.add(new Option(char.name, index));
        });
        s1.selectedIndex = 3; // Pain
        s2.selectedIndex = 1; // Itachi
    }

    function fight() {
        const val1 = parseInt(s1.value);
        const val2 = parseInt(s2.value);

        if (val1 === val2) {
            resultEl.innerText = "❌ Aynı karakter olmaz!";
            return;
        }

        // Efektleri Temizle
        rinnegan.style.opacity = "0";
        document.body.style.background = "#0d0d0d";
        resultEl.classList.remove("win-text");
        
        resultEl.innerText = "⚡ Savaş başlıyor...";

        setTimeout(() => {
            const c1 = characters[val1];
            const c2 = characters[val2];

            let score1 = (c1.power * 0.5) + (c1.speed * 0.3) + (c1.iq * 0.2) + (Math.random() * 20);
            let score2 = (c2.power * 0.5) + (c2.speed * 0.3) + (c2.iq * 0.2) + (Math.random() * 20);

            let winner = score1 > score2 ? c1.name : c2.name;

            resultEl.innerText = "🔥 Kazanan: " + winner;
            resultEl.classList.add("win-text");
            box.classList.add("shake");

            // EĞER PAİN KAZANIRSA RİNNEGAN'I PATLAT
            if (winner === "Pain") {
                rinnegan.style.opacity = "1"; // GÖRÜNÜR YAP
                document.body.style.background = "#1a0d26"; // ARKA PLANI DEĞİŞTİR
            }

            document.getElementById("winSound").play().catch(() => {});

            setTimeout(() => {
                box.classList.remove("shake");
            }, 500);

        }, 800);
    }

    init();
</script>

</body>
</html>
