<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Nexus - V8</title>
    <style>
        :root { --p1: #0a0a0a; --p2: #0a0a0a; --accent: #fff; --font: 'JetBrains Mono', monospace; }
        body { margin:0; height:100vh; background:#000; color:#fff; font-family: var(--font); display:flex; align-items:center; justify-content:center; overflow:hidden; }

        /* Reactive Environment */
        #nexus-bg { position:fixed; inset:0; background: linear-gradient(135deg, var(--p1), #000 50%, var(--p2)); opacity:0.25; transition: 1.5s; pointer-events:none; z-index:1; }
        
        .viewport { position:relative; width:95%; max-width:500px; background:rgba(5,5,5,0.95); border:1px solid #1a1a1a; padding:40px; border-radius:40px; backdrop-filter:blur(120px); z-index:10; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
        
        /* Grid System */
        .arena { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; gap:10px; }
        .slot { flex:1; aspect-ratio:3/4; background:#080808; border:1px solid #222; border-radius:24px; overflow:hidden; transition:0.8s cubic-bezier(0.16, 1, 0.3, 1); position:relative; }
        .slot img { width:100%; height:100%; object-fit:cover; opacity:0; transition:1s; filter:grayscale(1) contrast(0.7); transform: scale(1.1); }
        
        /* State Indicators */
        .slot.active img { opacity:0.6; transform: scale(1); }
        .slot.winner { transform:translateY(-20px); border-color:var(--accent); box-shadow:0 0 50px var(--accent); z-index:5; }
        .slot.winner img { opacity:1; filter:grayscale(0); transform: scale(1.05); }

        .controls { display:flex; flex-direction:column; gap:12px; }
        select, button { background:#111; color:#fff; border:1px solid #222; padding:18px; border-radius:18px; font-family:var(--font); font-weight:700; transition:0.3s; appearance:none; text-align-last: center; }
        button { background:var(--accent); color:#000; text-transform:uppercase; cursor:pointer; margin-top:15px; border:none; letter-spacing:3px; }
        button:disabled { opacity:0.1; filter: grayscale(1); cursor:not-allowed; }
        
        #status { font-size:10px; text-align:center; margin-top:30px; color:#444; letter-spacing:4px; font-weight:100; text-transform:uppercase; }
        
        .battle-shake { animation: nexusShake 0.1s infinite alternate; }
        @keyframes nexusShake { from{transform:translate(2px,0)} to{transform:translate(-2px,0)} }
    </style>
</head>
<body>

<div id="nexus-bg"></div>

<div class="viewport">
    <div class="arena">
        <div class="slot" id="slot-0"><img id="img-0"></div>
        <div style="opacity:0.05; font-size:24px; font-weight:100;">LOGIC_CORE</div>
        <div class="slot" id="slot-1"><img id="img-1"></div>
    </div>

    <div class="controls">
        <select id="sel-0" onchange="Nexus.dispatch('SET_PLAYER', {idx: 0, key: this.value})"></select>
        <select id="sel-1" onchange="Nexus.dispatch('SET_PLAYER', {idx: 1, key: this.value})"></select>
        <button id="main-cta" onclick="Nexus.dispatch('START_BATTLE')">Initialize Combat</button>
    </div>

    <div id="status">System_Stable</div>
</div>

<script>
/**
 * ARCHITECT NEXUS V8
 * Principles: Proxied State, Resource Pooling, Deterministic Engine
 */

const CONFIG = {
    UNITS: {
        itachi: { name: "ITACHI", pwr: 94, hex: "#ff3333", src: "https://i.pinimg.com/736x/0a/63/03/0a6303274291f0821a7a599d702d58d1a.jpg", sfx: "https://www.myinstants.com/media/sounds/itachi-shisui-susanoo.mp3" },
        pain: { name: "PAIN", pwr: 96, hex: "#aa66ff", src: "https://i.pinimg.com/736x/88/4a/c0/884ac06b00192b02e604f686c47144e5.jpg", sfx: "https://www.myinstants.com/media/sounds/shinra-tensei.mp3" },
        naruto: { name: "NARUTO", pwr: 88, hex: "#ffcc00", src: "https://i.pinimg.com/736x/5a/22/02/5a2202674e2d24266c253b26c36199a3.jpg", sfx: "https://www.myinstants.com/media/sounds/naruto-uzumaki-dattebayo.mp3" },
        sasuke: { name: "SASUKE", pwr: 91, hex: "#00eeff", src: "https://i.pinimg.com/736x/a2/28/7d/a2287da6403063f905d64860b8756a1b.jpg", sfx: "https://www.myinstants.com/media/sounds/chidori-sound-effect.mp3" }
    }
};

const Nexus = (() => {
    // 1. Audio Pool
    const _audioChannel = new Audio();

    // 2. Reactive State (Proxy)
    const _state = new Proxy({
        players: ['itachi', 'pain'],
        isBusy: false,
        winner: null,
        abortCtrl: new AbortController()
    }, {
        set(target, prop, value) {
            target[prop] = value;
            _render(); // Her değişimde otomatik render
            return true;
        }
    });

    // 3. UI Sync (Refined)
    const _render = async () => {
        const { players, isBusy, winner, abortCtrl } = _state;
        const btn = document.getElementById('main-cta');
        const status = document.getElementById('status');
        
        // UI Locking
        btn.disabled = isBusy || players[0] === players[1];
        status.innerText = isBusy ? "Analyzing_Data_Streams..." : "System_Ready";
        document.querySelector('.viewport').classList.toggle('battle-shake', isBusy);

        // Symm Aura
        document.documentElement.style.setProperty('--p1', CONFIG.UNITS[players[0]].hex + "44");
        document.documentElement.style.setProperty('--p2', CONFIG.UNITS[players[1]].hex + "44");

        // Sync Slots
        players.forEach((key, idx) => {
            const slot = document.getElementById(`slot-${idx}`);
            const img = document.getElementById(`img-${idx}`);
            
            slot.classList.remove('active', 'winner');
            if (winner === idx) {
                slot.classList.add('winner');
                document.documentElement.style.setProperty('--accent', CONFIG.UNITS[key].hex);
            }

            // High-Speed Asset Sync
            const loader = new Image();
            loader.src = CONFIG.UNITS[key].src;
            loader.onload = () => {
                if (!abortCtrl.signal.aborted) {
                    img.src = loader.src;
                    slot.classList.add('active');
                }
            };
        });
    };

    // 4. Combat Logic (Deterministic Chance)
    const _calculate = () => {
        const u1 = CONFIG.UNITS[_state.players[0]];
        const u2 = CONFIG.UNITS[_state.players[1]];
        const diff = u1.pwr - u2.pwr;
        const weightedChance = 50 + (diff * 4.5); // Her 1 pwr = %4.5 avantaj
        return (Math.random() * 100) < weightedChance ? 0 : 1;
    };

    return {
        init() {
            const selects = [document.getElementById('sel-0'), document.getElementById('sel-1')];
            Object.keys(CONFIG.UNITS).forEach(k => {
                selects.forEach(s => s.innerHTML += `<option value="${k}">${CONFIG.UNITS[k].name}</option>`);
            });
            selects[0].value = _state.players[0];
            selects[1].value = _state.players[1];
            _render();
        },

        dispatch(action, payload) {
            switch(action) {
                case 'SET_PLAYER':
                    _state.abortCtrl.abort();
                    _state.abortCtrl = new AbortController();
                    _state.players[payload.idx] = payload.key;
                    _state.winner = null;
                    break;

                case 'START_BATTLE':
                    if(_state.isBusy) return;
                    _state.isBusy = true;
                    _state.winner = null;
                    
                    setTimeout(() => {
                        const winIdx = _calculate();
                        _state.winner = winIdx;
                        _state.isBusy = false;
                        
                        _audioChannel.src = CONFIG.UNITS[_state.players[winIdx]].sfx;
                        _audioChannel.play().catch(() => {});
                    }, 1500);
                    break;
            }
        }
    };
})();

// Initialize
window.onload = () => Nexus.init();
</script>
</body>
</html>
