<div style="margin-top:30px; padding:25px; background:#1a1a1a; border-radius:15px; border: 1px solid #333; font-family: sans-serif; text-align: center; color: white;">

    <h2 style="color: #ff4444; letter-spacing: 1px; margin-bottom: 20px;">⚔️ Efsanevi Karşılaşma</h2>

    <div style="display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 0.9em;">
        <div style="text-align: left; padding: 10px; border-left: 3px solid #ffa500; background: #222; border-radius: 5px; width: 40%;">
            <b style="color:#ffa500;">Uzumaki Naruto</b><br>
            <span style="font-size: 0.8em; opacity: 0.8;">Güç: 90 | Hız: 85 | Zeka: 70</span>
        </div>
        <div style="text-align: left; padding: 10px; border-left: 3px solid #ff4444; background: #222; border-radius: 5px; width: 40%;">
            <b style="color:#ff4444;">Uchiha Itachi</b><br>
            <span style="font-size: 0.8em; opacity: 0.8;">Güç: 88 | Hız: 90 | Zeka: 95</span>
        </div>
    </div>

    <button onclick="fightNI()" style="cursor: pointer; width: 80%; padding: 12px; border: none; border-radius: 10px; background: #ff4444; color: white; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 68, 68, 0.2);">
        SAVAŞI BAŞLAT
    </button>

    <div id="resultBoxNI" style="margin-top:20px; min-height: 40px; border-top: 1px solid #333; padding-top: 15px;">
        <p id="resultNI" style="font-size: 1.2em; font-weight: bold; margin: 0;"></p>
    </div>

</div>

<script>
function fightNI() {
    const resultElement = document.getElementById("resultNI");
    
    // Küçük bir bekleme efekti (Heyecan katar)
    resultElement.style.opacity = "0.5";
    resultElement.innerText = "⚡ Çakralar çarpışıyor...";

    setTimeout(() => {
        // Senin orijinal hesaplama mantığın
        let naruto = 90 + 85 + 70 + Math.random() * 20;
        let itachi = 88 + 90 + 95 + Math.random() * 20;

        let resultText;
        resultElement.style.opacity = "1";

        if (naruto > itachi) {
            resultText = "<span style='color: #ffa500;'>🔥 Kazanan: Naruto</span>";
        } else if (itachi > naruto) {
            resultText = "<span style='color: #ff4444;'>🔥 Kazanan: Itachi</span>";
        } else {
            resultText = "<span style='color: #888;'>⚖️ Berabere!</span>";
        }

        resultElement.innerHTML = resultText;
    }, 500); 
}
               </script>
