<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Architect Obsidian V10 - Pure Architecture</title>
    <style>
        :root { --accent: #fff; --bg: #000; --font: 'JetBrains Mono', monospace; }
        body { margin:0; height:100vh; background:var(--bg); color:#fff; font-family:var(--font); display:flex; align-items:center; justify-content:center; overflow:hidden; }

        /* Optimized Layers */
        #fx-layer { position:fixed; inset:0; z-index:1; pointer-events:none; }
        .viewport { position:relative; width:92%; max-width:520px; background:rgba(5,5,5,0.98); border:1px solid #111; padding:40px; border-radius:45px; z-index:10; }

        /* Component States */
        .arena { display:grid; grid-template-columns: 1fr 40px 1fr; gap:20px; margin-bottom:40px; }
        .slot { aspect-ratio:3/4; background:#030303; border:1px solid #111; border-radius:30px; overflow:hidden; position:relative; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .slot img { width:100%; height:100%; object-fit:cover; opacity:0; transition: 1s; filter: grayscale(1); }
        
        /* State Reflectors */
        .slot[data-state="ready"] img { opacity:0.4; filter: grayscale(0.6); }
        .slot[data-state="winner"] { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 0 50px -10px var(--accent); }
        .slot[data-state="winner"] img { opacity:1; filter: grayscale(0); }

        /* UI Elements */
        .controls { display:flex; flex-direction:column; gap:12px; }
        .select-wrapper { position:relative; }
        select, button { width:100%; background:#080808; color:#fff; border:1px solid #1a1a1a; padding:20px; border-radius:20px; font-family:inherit; font-weight:700; cursor:pointer; outline:none; transition:0.3s; }
        button { background:var(--accent); color:#000; border:none; text-transform:uppercase; letter-spacing:4px; margin-top:20px; }
        button:disabled { filter: grayscale(1); opacity:0.1; }

        /* FX Components */
        .rinnegan-ring { position:absolute; border:1px solid var(--fx-color); border-radius:50%; left:50%; top:50%; transform:translate(-50%,-50%); animation: obsidian-pulse 4s infinite linear; opacity:0; }
        @keyframes obsidian-pulse { 0% {width:0; height:0; opacity:0.5;} 100% {width:1000px; height:1000px; opacity:0;} }
    </style>
</head>
<body>

<div id="fx-layer"></div>

<div class="viewport" id="nexus">
    <div class="arena">
        <div class="slot" id="slot-0" data-idx="0"><img></div>
        <div style="display:flex; align-items:center; justify-content:center; opacity:0.1; font-size:12px;">VS</div>
        <div class="slot" id="slot-1" data-idx="1"><img></div>
    </div>

    <div class="controls" id="ui-root">
        <div class="select-wrapper"><select data-action="change-player" data-pidx="0"></select></div>
        <div class="select-wrapper"><select data-action="change-player" data-pidx="1"></select></div>
        <button data-action="initiate-battle" id="battle-btn">Run Engine</button>
    </div>
</div>

<script>
/**
 * ARCHITECT OBSIDIAN V10
 * Concept: Immutable Architecture, Deterministic Probability, FX Registry
 */

// 1. DATA & FX REGISTRY
const REGISTRY = {
    UNITS: {
        itachi: { name: "ITACHI", pwr: 94, hex: "#ff2222", src: "https://i.ibb.co/L5rK5Q8/itachi.jpg", fx: [] },
        pain: { name: "PAIN", pwr: 96, hex: "#9955ff", src: "https://i.ibb.co/mS7xZ8M/pain.jpg", fx: ['rinnegan'] },
        sasuke: { name: "SASUKE", pwr: 91, hex: "#00ccff", src: "https://i.ibb.co/vYm6sF4/sasuke.jpg", fx: [] },
        naruto: { name: "NARUTO", pwr: 88, hex: "#ffaa00", src: "https://i.ibb.co/K2Nf6X2/naruto.jpg", fx: [] }
    },
    EFFECTS: {
        rinnegan: (color) => `<div class="rinnegan-ring" style="--fx-color:${color}"></div>`
    },
    ASSET_CACHE: new Map()
};

// 2. IMMUTABLE ENGINE
const Engine = (() => {
    let _state = Object.freeze({
        players: ['itachi', 'pain'],
        isBusy: false,
        winner: null,
        lastAction: null
    });

    const _subscribers = [];

    const _reducer = (state, action) => {
        switch(action.type) {
            case 'SET_PLAYER':
                const newPlayers = [...state.players];
                newPlayers[action.idx] = action.key;
                return { ...state, players: newPlayers, winner: null, lastAction: 'PLAYER_CHANGE' };
            case 'START_BATTLE':
                return { ...state, isBusy: true, winner: null, lastAction: 'BATTLE_START' };
            case 'RESOLVE_BATTLE':
                return { ...state, isBusy: false, winner: action.winner, lastAction: 'BATTLE_END' };
            default: return state;
        }
    };

    return {
        dispatch: (action) => {
            _state = Object.freeze(_reducer(_state, action));
            _subscribers.forEach(fn => fn(_state));
        },
        subscribe: (fn) => _subscribers.push(fn),
        getState: () => _state
    };
})();

// 3. UI CONTROLLER (Virtual-ish DOM)
const UI = {
    init: () => {
        const selects = document.querySelectorAll('select');
        Object.keys(REGISTRY.UNITS).forEach(k => {
            selects.forEach(s => s.innerHTML += `<option value="${k}">${REGISTRY.UNITS[k].name}</option>`);
        });
        selects[0].value = Engine.getState().players[0];
        selects[1].value = Engine.getState().players[1];

        // Centralized Event Delegation
        document.addEventListener('change', (e) => {
            if(e.target.dataset.action === 'change-player') {
                Engine.dispatch({ type: 'SET_PLAYER', idx: parseInt(e.target.dataset.pidx), key: e.target.value });
            }
        });

        document.addEventListener('click', (e) => {
            if(e.target.dataset.action === 'initiate-battle') UI.handleBattle();
        });

        Engine.subscribe(UI.render);
        UI.render(Engine.getState());
    },

    handleBattle: () => {
        Engine.dispatch({ type: 'START_BATTLE' });
        setTimeout(() => {
            const state = Engine.getState();
            const u1 = REGISTRY.UNITS[state.players[0]];
            const u2 = REGISTRY.UNITS[state.players[1]];
            
            // Deterministic Weighted Probability
            const total = u1.pwr + u2.pwr;
            const threshold = (u1.pwr / total) * 100;
            const winner = (Math.random() * 100) < threshold ? 0 : 1;
            
            Engine.dispatch({ type: 'RESOLVE_BATTLE', winner });
        }, 1500);
    },

    render: (state) => {
        const fxLayer = document.getElementById('fx-layer');
        const btn = document.getElementById('battle-btn');

        btn.disabled = state.isBusy;
        
        state.players.forEach((key, i) => {
            const unit = REGISTRY.UNITS[key];
            const slot = document.getElementById(`slot-${i}`);
            const img = slot.querySelector('img');

            // Asset Cache Control
            if (!REGISTRY.ASSET_CACHE.has(unit.src)) {
                const loader = new Image();
                loader.src = unit.src;
                loader.onload = () => {
                    REGISTRY.ASSET_CACHE.set(unit.src, true);
                    img.src = unit.src;
                    slot.setAttribute('data-state', 'ready');
                };
            } else {
                img.src = unit.src;
                slot.setAttribute('data-state', state.winner === i ? 'winner' : 'ready');
            }

            // Centralized FX Rendering (Only if Action is PLAYER_CHANGE or BATTLE_END)
            if (state.lastAction === 'PLAYER_CHANGE' || i === 0) {
                fxLayer.innerHTML = '';
                state.players.forEach(pKey => {
                    const pUnit = REGISTRY.UNITS[pKey];
                    pUnit.fx.forEach(fxKey => {
                        if (REGISTRY.EFFECTS[fxKey]) fxLayer.innerHTML += REGISTRY.EFFECTS[fxKey](pUnit.hex);
                    });
                });
            }
        });

        if (state.winner !== null) {
            document.documentElement.style.setProperty('--accent', REGISTRY.UNITS[state.players[state.winner]].hex);
        }
    }
};

UI.init();
</script>
</body>
</html>
