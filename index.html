<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect - Mastery Edition v5.2</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0d0d0d;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 1s ease;
        }
        .signature { position: fixed; bottom: 20px; color: #444; font-size: 11px; letter-spacing: 2px; font-weight: bold; z-index: 10; }
        .architect-name { color: #666; transition: 0.5s; }
        .signature:hover .architect-name { color: #ff4444; text-shadow: 0 0 10px #ff4444; }

        #quote-box {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); padding: 15px 40px;
            border-radius: 0 0 25px 25px; border: 2px solid #333;
            font-size: 20px; font-weight: bold; z-index: 100;
            text-align: center; color: white;
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #quote-box.show { top: 0; }

        #rinnegan-bg {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 350vw; height: 350vh;
            opacity: 0; z-index: -1;
            transition: opacity 1.5s ease;
            background: repeating-radial-gradient(circle, #1a0d26 0%, #1a0d26 8%, #4b3d61 9%, #4b3d61 10%, #1a0d26 11%);
        }

        .vs-box {
            background: rgba(26, 26, 26, 0.95);
            padding: 30px; border-radius: 20px;
            text-align: center;
            width: 90%; max-width: 450px;
            border: 1px solid #444;
            z-index: 10;
        }
        h2 { color: #fff; margin-bottom: 20px; }

        select {
            padding: 12px;
            background: #333;
            color: white;
            border-radius: 10px;
            width: 42%;
            border: 1px solid #555;
            outline: none;
        }

        button {
            background: linear-gradient(45deg, #ff4444, #cc0000);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #result {
            margin-top: 30px;
            color: #ddd;
            font-size: 20px;
            font-weight: bold;
            min-height: 28px;
        }
        .win-text { color: #ffcc00 !important; text-shadow: 0 0 15px #ffcc00; }

        .shake-heavy { animation: shake-heavy 0.8s; }
        @keyframes shake-heavy {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-8px, 8px); }
            50% { transform: translate(8px, -8px); }
        }
    </style>
</head>
<body>

<div id="rinnegan-bg"></div>
<div id="quote-box"></div>

<div class="vs-box">
    <h2>⚔️ Efsanevi Karşılaşma</h2>
    <div class="selection-area">
        <select id="char1"></select>
        <span style="color: white; font-weight: bold; margin: 0 10px;">VS</span>
        <select id="char2"></select>
    </div>
    <br>
    <button id="fightBtn">SAVAŞ BAŞLAT</button>
    <p id="result">Karakterini seç ve savaşı başlat!</p>
</div>

<div class="signature">
    DEVELOPED BY <span class="architect-name">THE ARCHITECT MUSTAFA</span>
</div>

<audio id="sound-pain" src="https://www.myinstants.com/media/sounds/shinra-tensei.mp3" preload="auto"></audio>
<audio id="sound-itachi" src="https://www.myinstants.com/media/sounds/itachi-susanoo_Yg874M6.mp3" preload="auto"></audio>
<audio id="sound-naruto" src="https://www.myinstants.com/media/sounds/naruto-uzumaki-dattebayo.mp3" preload="auto"></audio>
<audio id="sound-sasuke" src="https://www.myinstants.com/media/sounds/chidori-sound-effect.mp3" preload="auto"></audio>

<script>
const characters = [
    { name: "Naruto", power: 92, speed: 88, iq: 75, quote: "Vazgeçmeyeceğim, bu benim yolum!", color: "#4d2600", sound: "sound-naruto" },
    { name: "Itachi", power: 85, speed: 92, iq: 98, quote: "Affet Sasuke, bir dahaki sefere...", color: "#260000", sound: "sound-itachi" },
    { name: "Sasuke", power: 90, speed: 90, iq: 88, quote: "Gözlerim karanlığı net görüyor.", color: "#000026", sound: "sound-sasuke" },
    { name: "Pain", power: 95, speed: 82, iq: 90, quote: "Dünya acıyı anlayacak...", color: "#1a0d26", sound: "sound-pain" }
];

let isFighting = false;

const s1 = document.getElementById("char1");
const s2 = document.getElementById("char2");
const resultEl = document.getElementById("result");
const rinnegan = document.getElementById("rinnegan-bg");
const quoteBox = document.getElementById("quote-box");
const box = document.querySelector(".vs-box");
const btn = document.getElementById("fightBtn");

window.addEventListener("DOMContentLoaded", () => {
    characters.forEach((char, index) => {
        s1.add(new Option(char.name, index));
        s2.add(new Option(char.name, index));
    });
    s1.selectedIndex = 0;
    s2.selectedIndex = 1;
});

btn.addEventListener("click", () => {
    // Seslerin yüklenmesini tetiklemek için butona tıklandığında kısa bir ses denemesi yapar
    fight();
});

function fight() {
    if (isFighting) return;
    
    const val1 = parseInt(s1.value);
    const val2 = parseInt(s2.value);

    if (val1 === val2) {
        resultEl.innerText = "❌ Aynı karakter olmaz!";
        return;
    }

    isFighting = true;
    btn.disabled = true;

    // TÜM SESLERİ ÖNCE DURDUR VE SIFIRLA
    const audios = document.querySelectorAll('audio');
    audios.forEach(a => {
        a.pause();
        a.currentTime = 0;
    });

    resultEl.classList.remove("win-text");
    quoteBox.classList.remove("show");
    rinnegan.style.opacity = "0";
    box.classList.remove("shake-heavy");
    document.body.style.background = "#0d0d0d";

    resultEl.innerText = "⚡ Çakralar çarpışıyor...";

    setTimeout(() => {
        const c1 = characters[val1];
        const c2 = characters[val2];

        // Şans faktörüyle kazanma puanı
        const score1 = (c1.power*0.4 + c1.speed*0.3 + c1.iq*0.3) + Math.random()*20;
        const score2 = (c2.power*0.4 + c2.speed*0.3 + c2.iq*0.3) + Math.random()*20;

        const winner = score1 > score2 ? c1 : c2;

        resultEl.innerText = "🔥 Kazanan: " + winner.name;
        resultEl.classList.add("win-text");
        quoteBox.innerText = `"${winner.quote}"`;
        quoteBox.classList.add("show");
        document.body.style.background = winner.color;

        if (winner.name === "Pain") {
            rinnegan.style.opacity = "1";
            box.classList.add("shake-heavy");
        }

        // SES ÇALMA - Gelişmiş tetikleme
        const sound = document.getElementById(winner.sound);
        if (sound) {
            // Tarayıcı bazen sesin yüklenmesini bekleyebilir, o yüzden play() sonucunu kontrol et
            let playAttempt = sound.play();
            if (playAttempt !== undefined) {
                playAttempt.catch(error => {
                    console.error("Ses engellendi:", error);
                    resultEl.innerText += " (Ses engellendi, ekrana tıkla!)";
                });
            }
        }

        setTimeout(() => {
            isFighting = false;
            btn.disabled = false;
        }, 2000);

    }, 1000);
}
</script>
</body>
</html>
