<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Architect - Final Restore (Fixed)</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
    transition:0.5s;
}/* ===== RINNEGAN UPGRADE ===== */ .rinnegan-container{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:-1; opacity:0.35; }

.ring{ position:absolute; border:2px solid #b38cff; border-radius:50%; box-shadow:0 0 20px #b38cff, inset 0 0 20px #b38cff; }

.r1{width:120px;height:120px;animation:spin 6s linear infinite;} .r2{width:260px;height:260px;animation:spinReverse 10s linear infinite;} .r3{width:420px;height:420px;animation:spin 14s linear infinite;} .r4{width:600px;height:600px;animation:spinReverse 18s linear infinite;}

@keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} } @keyframes spinReverse{ from{transform:rotate(360deg);} to{transform:rotate(0deg);} }

/* ===== UI ===== */ .vs-box{ background:rgba(15,15,15,0.95); padding:30px; border-radius:20px; text-align:center; border:1px solid #333; width:85%; max-width:380px; backdrop-filter:blur(10px); box-shadow:0 10px 30px rgba(0,0,0,0.8); }

select{ width:100%; padding:12px; margin:10px 0; border-radius:8px; background:#222; color:white; border:1px solid #444; font-weight:bold; }

button{ width:100%; padding:15px; margin-top:15px; border-radius:8px; background:#ff4444; color:white; border:none; font-weight:bold; cursor:pointer; font-size:16px; } button:active{transform:scale(0.95);}

#result{margin-top:20px;font-size:20px;font-weight:bold;color:#ffcc00;} </style>

</head>
<body><div class="rinnegan-container" id="rinnegan">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="ring r4"></div>
</div><div class="vs-box">
    <h2>⚔️ Efsanevi Karşılaşma</h2><select id="char1" onchange="checkVisuals()">
    <option value="0">Naruto</option>
    <option value="1">Itachi</option>
    <option value="2">Sasuke</option>
    <option value="3" selected>Pain</option>
</select>

<div>VS</div>

<select id="char2" onchange="checkVisuals()">
    <option value="0" selected>Naruto</option>
    <option value="1">Itachi</option>
    <option value="2">Sasuke</option>
    <option value="3">Pain</option>
</select>

<button onclick="initiateFight()">SAVAŞI BAŞLAT</button>

<div id="result">Karakterini seç!</div>

</div><audio id="s-0" src="https://www.myinstants.com/media/sounds/naruto-uzumaki-dattebayo.mp3"></audio> <audio id="s-1" src="https://www.myinstants.com/media/sounds/itachi-shisui-susanoo.mp3"></audio> <audio id="s-2" src="https://www.myinstants.com/media/sounds/chidori-sound-effect.mp3"></audio> <audio id="s-3" src="https://www.myinstants.com/media/sounds/shinra-tensei.mp3"></audio>

<script>
let audioUnlocked=false;

function checkVisuals(){
    const c1=document.getElementById("char1").value;
    const c2=document.getElementById("char2").value;
    const r=document.getElementById("rinnegan");

    if(c1==="3"||c2==="3"){
        r.style.display="flex";
        document.body.style.background="#120a1a";
    }else{
        r.style.display="none";
        document.body.style.background="#050505";
    }
}

function unlockAudio(){
    for(let i=0;i<4;i++){
        let a=document.getElementById("s-"+i);
        a.play().then(()=>{a.pause();a.currentTime=0;}).catch(()=>{});
    }
    audioUnlocked=true;
}

function initiateFight(){
    if(!audioUnlocked) unlockAudio();
    fight();
}

function fight(){
    const c1=document.getElementById("char1").value;
    const c2=document.getElementById("char2").value;
    const res=document.getElementById("result");

    const names=["Naruto 🍥","Itachi 👁️","Sasuke ⚡","Pain 🌀"];

    if(c1===c2){
        res.innerText="Aynı karakterler kapışamaz!";
        res.style.color="#ff4444";
        return;
    }

    res.innerText="⚡ Çakralar çarpışıyor...";
    res.style.color="#ffcc00";

    setTimeout(()=>{
        const winner=Math.random()>0.5?c1:c2;
        res.innerText="🔥 KAZANAN: "+names[winner];
        res.style.color="#00ffb3";

        let audio=document.getElementById("s-"+winner);
        if(audio) audio.play();
    },900);
}

checkVisuals();
</script></body>
</html>
