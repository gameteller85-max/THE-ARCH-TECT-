<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect - Final Restore</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
            transition: background 0.5s;
        }

        /* Gelişmiş Rinnegan Efekti */
        .rinnegan-container {
            position: absolute;
            z-index: -1;
            display: none; /* Başlangıçta gizli */
            align-items: center;
            justify-content: center;
            opacity: 0.4;
        }
        .ring {
            position: absolute;
            border: 3px solid #8a70a1;
            border-radius: 50%;
            box-shadow: 0 0 15px #8a70a1, inset 0 0 15px #8a70a1;
        }
        .r1 { width: 120px; height: 120px; }
        .r2 { width: 260px; height: 260px; }
        .r3 { width: 420px; height: 420px; }
        .r4 { width: 600px; height: 600px; }

        .vs-box { 
            background: rgba(15, 15, 15, 0.95); 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            width: 85%; 
            max-width: 380px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border-radius: 8px; background: #222; color: white; 
            border: 1px solid #444; font-weight: bold;
        }

        button { 
            width: 100%; padding: 15px; margin-top: 15px; 
            border-radius: 8px; background: #ff4444; color: white; 
            border: none; font-weight: bold; cursor: pointer;
            font-size: 16px; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }

        #result { margin-top: 20px; font-size: 20px; font-weight: bold; color: #ffcc00; }
        .signature { position: fixed; bottom: 15px; color: #444; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="rinnegan" class="rinnegan-container">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="ring r4"></div>
</div>

<div class="vs-box">
    <h2 id="title">⚔️ Efsanevi Karşılaşma</h2>
    
    <select id="char1" onchange="checkVisuals()">
        <option value="0">Naruto</option>
        <option value="1">Itachi</option>
        <option value="2">Sasuke</option>
        <option value="3" selected>Pain</option>
    </select>

    <div style="color: #666; margin: 5px;">VS</div>

    <select id="char2" onchange="checkVisuals()">
        <option value="0" selected>Naruto</option>
        <option value="1">Itachi</option>
        <option value="2">Sasuke</option>
        <option value="3">Pain</option>
    </select>

    <button onclick="initiateFight()">SAVAŞI BAŞLAT</button>
    
    <div id="result">Karakterini seç!</div>
</div>

<div class="signature">DEVELOPED BY THE ARCHITECT MUSTAFA</div>

<audio id="s-0" src="https://www.myinstants.com/media/sounds/naruto-uzumaki-dattebayo.mp3"></audio>
<audio id="s-1" src="https://www.myinstants.com/media/sounds/itachi-shisui-susanoo.mp3"></audio>
<audio id="s-2" src="https://www.myinstants.com/media/sounds/chidori-sound-effect.mp3"></audio>
<audio id="s-3" src="https://www.myinstants.com/media/sounds/shinra-tensei.mp3"></audio>

<script>
    let audioUnlocked = false;

    // Karakter değiştikçe Rinnegan'ı kontrol eden fonksiyon
    function checkVisuals() {
        const c1 = document.getElementById("char1").value;
        const c2 = document.getElementById("char2").value;
        const rinnegan = document.getElementById("rinnegan");

        // Eğer karakterlerden biri Pain (index 3) ise Rinnegan'ı göster, değilse gizle
        if (c1 === "3" || c2 === "3") {
            rinnegan.style.display = "flex";
            document.body.style.background = "#0d0a12"; // Hafif morumsu hava
        } else {
            rinnegan.style.display = "none";
            document.body.style.background = "#050505"; // Standart siyah
        }
    }

    // İlk açılışta kontrol et
    checkVisuals();

    function initiateFight() {
        if (!audioUnlocked) {
            for (let i = 0; i < 4; i++) {
                let s = document.getElementById("s-" + i);
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            }
            audioUnlocked = true;
        }
        fight();
    }

    function fight() {
        const c1 = document.getElementById("char1").value;
        const c2 = document.getElementById("char2").value;
        const res = document.getElementById("result");
        const names = ["Naruto 🍥", "Itachi 👁️", "Sasuke ⚡", "Pain 🌀"];

        if(c1 === c2) { 
            res.innerText = "Aynı karakterler kapışamaz!"; 
            res.style.color = "#ff4444";
            return; 
        }

        for(let i=0; i<4; i++) {
            let s = document.getElementById("s-" + i);
            s.pause(); s.currentTime = 0;
        }

        res.innerText = "⚡ Çakralar çarpışıyor...";
        res.style.color = "#ffcc00";
        
        setTimeout(() => {
            const winnerIdx = Math.random() > 0.5 ? c1 : c2;
            res.innerText = "🔥 KAZANAN: " + names[winnerIdx];
            res.style.color = "#00ffb3";

            const sound = document.getElementById("s-" + winnerIdx);
            if(sound) sound.play();
        }, 800);
    }
</script>
</body>
</html>
