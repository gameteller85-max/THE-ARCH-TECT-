<div class="vs-box">

<h2>⚔️ Efsanevi Karşılaşma</h2>

<select id="char1"></select>
<select id="char2"></select>

<br>

<button onclick="fight()">SAVAŞ BAŞLAT</button>

<p id="result"></p>

</div>

<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<style>
.vs-box{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  text-align:center;
  margin-top:30px;
}

select, button{
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#ff4444;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#ff2222;
}

#result{
  margin-top:20px;
  font-weight:bold;
  font-size:18px;
}

/* ANİMASYON */
.win{
  animation: glow 0.6s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px red; }
  to{ text-shadow:0 0 20px orange; }
}

/* TİTREŞİM */
.shake{
  animation: shake 0.3s;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}
</style>

<script>

const characters = [
 {name:"Naruto", power:90, speed:85, iq:70},
 {name:"Itachi", power:88, speed:90, iq:95},
 {name:"Sasuke", power:89, speed:88, iq:80}
];

const s1 = document.getElementById("char1");
const s2 = document.getElementById("char2");
const resultEl = document.getElementById("result");

// SELECT DOLDUR
characters.forEach((c,i)=>{
  s1.add(new Option(c.name,i));
  s2.add(new Option(c.name,i));
});

function fight(){

let c1 = characters[s1.value];
let c2 = characters[s2.value];

if(s1.value === s2.value){
  resultEl.innerText = "Aynı karakter seçilemez!";
  return;
}

// küçük bekleme efekti
resultEl.innerText = "⚡ Çakralar çarpışıyor...";

// kısa delay
setTimeout(()=>{

let score1 = c1.power + c1.speed + c1.iq + Math.random()*20;
let score2 = c2.power + c2.speed + c2.iq + Math.random()*20;

let winner = score1 > score2 ? c1.name : c2.name;

resultEl.innerText = "🔥 Kazanan: " + winner;

// animasyon
resultEl.classList.add("win");
document.body.classList.add("shake");

// ses
document.getElementById("winSound").play();

// temizleme
setTimeout(()=>{
  resultEl.classList.remove("win");
  document.body.classList.remove("shake");
},800);

},400);

}

</script>
