<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efsanevi Karşılaşma v2.2 - Rinnegan Edition</title>
</head>
<body>

<div id="rinnegan-bg"></div>

<div class="vs-box">
    <h2>⚔️ Efsanevi Karşılaşma</h2>

    <div class="selection-area">
        <select id="char1"></select>
        <span style="color: white; font-weight: bold; margin: 0 10px;">VS</span>
        <select id="char2"></select>
    </div>

    <br>

    <button id="fightBtn" onclick="fight()">SAVAŞ BAŞLAT</button>

    <p id="result">Karakterini seç ve savaşı başlat!</p>
</div>

<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

<style>
    * { box-sizing: border-box; }
    
    body {
        background-color: #0d0d0d;
        font-family: 'Segoe UI', Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden; /* Taşmaları engeller */
        transition: background 0.8s ease;
    }

    /* RİNNEGAN EFEKTİ (CSS ile oluşturulan halkalar) */
    #rinnegan-bg {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 250vw;
        height: 250vh;
        /* Pain'in göz yapısını andıran iç içe mor halkalar */
        background: radial-gradient(circle, 
            transparent 5%, 
            #2e1a47 6%, transparent 7%, 
            #2e1a47 15%, transparent 16%, 
            #2e1a47 25%, transparent 26%, 
            #2e1a47 35%, transparent 36%,
            #2e1a47 45%, transparent 46%);
        opacity: 0;
        z-index: -1;
        transition: opacity 1s ease;
        pointer-events: none;
    }

    .vs-box {
        background: rgba(26, 26, 26, 0.9);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        width: 90%;
        max-width: 450px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        border: 2px solid #444;
        z-index: 10;
        backdrop-filter: blur(5px); /* Arkayı hafif bulanık yapar */
    }

    h2 {
        color: #fff;
        font-size: 24px;
        margin-bottom: 25px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .selection-area {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
    }

    select {
        padding: 12px;
        background: #2a2a2a;
        color: white;
        border: 1px solid #555;
        border-radius: 8px;
        outline: none;
        cursor: pointer;
        width: 42%;
    }

    button {
        background: linear-gradient(45deg, #ff4444, #cc0000);
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 68, 68, 0.6);
    }

    #result {
        margin-top: 30px;
        color: #aaa;
        font-size: 18px;
        min-height: 24px;
    }

    /* KAZANAN EFEKTİ */
    .win-text {
        color: #ffcc00 !important;
        font-size: 22px !important;
        text-shadow: 0 0 15px #ffcc00;
        font-weight: bold;
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .shake {
        animation: shakeAnim 0.4s ease-in-out;
    }

    @keyframes shakeAnim {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        50% { transform: translateX(8px); }
        75% { transform: translateX(-8px); }
    }
</style>

<script>
    // Karakterler ve Güçler
    const characters = [
        { name: "Naruto", power: 92, speed: 88, iq: 75 },
        { name: "Itachi", power: 85, speed: 92, iq: 98 },
        { name: "Sasuke", power: 90, speed: 90, iq: 88 },
        { name: "Pain", power: 95, speed: 82, iq: 90 }
    ];

    const s1 = document.getElementById("char1");
    const s2 = document.getElementById("char2");
    const resultEl = document.getElementById("result");
    const box = document.querySelector(".vs-box");
    const winSound = document.getElementById("winSound");
    const rinneganBg = document.getElementById("rinnegan-bg");

    // Başlatma: Listeleri doldur
    function init() {
        s1.innerHTML = "";
        s2.innerHTML = "";
        characters.forEach((char, index) => {
            s1.add(new Option(char.name, index));
            s2.add(new Option(char.name, index));
        });
        s1.selectedIndex = 3; // Sol tarafta Pain başlasın
        s2.selectedIndex = 1; // Sağ tarafta Itachi başlasın
    }

    function fight() {
        const val1 = parseInt(s1.value);
        const val2 = parseInt(s2.value);

        if (val1 === val2) {
            resultEl.innerText = "❌ Aynı karakterler savaşamaz!";
            resultEl.style.color = "#ff4444";
            return;
        }

        const btn = document.getElementById("fightBtn");
        btn.disabled = true;

        // Her savaştan önce efektleri sıfırla
        resultEl.classList.remove("win-text");
        rinneganBg.style.opacity = "0";
        document.body.style.background = "#0d0d0d";
        
        resultEl.style.color = "#eee";
        resultEl.innerText = "⚡ Çakralar çarpışıyor...";

        setTimeout(() => {
            const c1 = characters[val1];
            const c2 = characters[val2];

            // Güç Hesaplama
            let p1 = (c1.power * 0.5) + (c1.speed * 0.3) + (c1.iq * 0.2) + (Math.random() * 12);
            let p2 = (c2.power * 0.5) + (c2.speed * 0.3) + (c2.iq * 0.2) + (Math.random() * 12);

            let winner = p1 > p2 ? c1.name : c2.name;

            resultEl.innerText = "🔥 Kazanan: " + winner;
            resultEl.classList.add("win-text");
            box.classList.add("shake");

            // ÖZEL: Pain Kazanırsa Rinnegan'ı Aktif Et
            if (winner === "Pain") {
                rinneganBg.style.opacity = "0.5";
                document.body.style.background = "#1a0d26";
            }

            // Ses
            winSound.currentTime = 0;
            winSound.play().catch(() => {});

            setTimeout(() => {
                box.classList.remove("shake");
                btn.disabled = false;
            }, 500);

        }, 800);
    }

    init();
</script>

</body>
</html>
