<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ARCHITECT V11 FIX</title>

<style>
body{
margin:0;height:100vh;background:#000;color:#fff;
display:flex;align-items:center;justify-content:center;
font-family:monospace;
}

.viewport{width:420px;background:#0a0a0a;padding:30px;border-radius:20px}

.arena{display:flex;justify-content:space-between;margin-bottom:20px}

.card{width:160px;height:220px;background:#111;border-radius:15px;overflow:hidden}
.card img{width:100%;height:100%;object-fit:cover;opacity:0;transition:.5s}
.card.active img{opacity:1}
.card.winner{border:2px solid gold}

button,select{
width:100%;padding:12px;margin-top:10px;
background:#111;color:#fff;border:1px solid #333;border-radius:10px
}
button{cursor:pointer;background:#fff;color:#000;font-weight:bold}
</style>
</head>

<body>

<div class="viewport">
  <div class="arena">
    <div class="card" id="c1"><img id="i1"></div>
    <div class="card" id="c2"><img id="i2"></div>
  </div>

  <select id="s1"></select>
  <select id="s2"></select>
  <button onclick="fight()">FIGHT</button>

  <div id="msg" style="margin-top:10px;font-size:12px"></div>
</div>

<script>
const db = {
itachi:{n:"Itachi",p:94,i:"https://i.ibb.co/L5rK5Q8/itachi.jpg",s:"https://www.myinstants.com/media/sounds/itachi-shisui-susanoo.mp3"},
pain:{n:"Pain",p:96,i:"https://i.ibb.co/mS7xZ8M/pain.jpg",s:"https://www.myinstants.com/media/sounds/shinra-tensei.mp3"},
sasuke:{n:"Sasuke",p:91,i:"https://i.ibb.co/vYm6sF4/sasuke.jpg",s:"https://www.myinstants.com/media/sounds/chidori-sound-effect.mp3"},
naruto:{n:"Naruto",p:88,i:"https://i.ibb.co/K2Nf6X2/naruto.jpg",s:"https://www.myinstants.com/media/sounds/naruto-uzumaki-dattebayo.mp3"},

madara:{n:"Madara Uchiha",p:98,i:"https://i.ibb.co/7Y9Q7kZ/madara.jpg",s:"https://www.myinstants.com/media/sounds/susanoo.mp3"},
minato:{n:"Minato Namikaze",p:97,i:"https://i.ibb.co/3vK5Z9R/minato.jpg",s:"https://www.myinstants.com/media/sounds/hiraishin.mp3"}
};

let a1=new Audio(),a2=new Audio();

function init(){
for(let k in db){
s1.innerHTML+=`<option value="${k}">${db[k].n}</option>`
s2.innerHTML+=`<option value="${k}">${db[k].n}</option>`
}
s1.value="itachi"
s2.value="pain"
sync()
}

function sync(){
let p1=db[s1.value]
let p2=db[s2.value]

i1.src=p1.i
i2.src=p2.i

c1.classList.add("active")
c2.classList.add("active")
}

function fight(){
let p1=db[s1.value]
let p2=db[s2.value]

if(s1.value===s2.value){
msg.innerText="Aynı karakter seçilemez"
return
}

let w=Math.random()<(p1.p/(p1.p+p2.p))?1:2

if(w===1){
c1.classList.add("winner")
c2.classList.remove("winner")
msg.innerText=p1.n+" kazandı"
a1.src=p1.s;a1.play().catch(()=>{})
}else{
c2.classList.add("winner")
c1.classList.remove("winner")
msg.innerText=p2.n+" kazandı"
a2.src=p2.s;a2.play().catch(()=>{})
}
}

init()
</script>

</body>
</html>
