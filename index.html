<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect - Final Restore</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        /* Arkaplan Rinnegan Tasarımı */
        .rinnegan-container {
            position: absolute;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ring {
            position: absolute;
            border: 2px solid rgba(138, 112, 161, 0.15);
            border-radius: 50%;
        }
        .r1 { width: 150px; height: 150px; }
        .r2 { width: 300px; height: 300px; }
        .r3 { width: 450px; height: 450px; }
        .r4 { width: 600px; height: 600px; }

        .vs-box { 
            background: rgba(20, 20, 20, 0.9); 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            width: 85%; 
            max-width: 380px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        h2 { margin-bottom: 20px; font-size: 24px; letter-spacing: 1px; }
        
        select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            background: #222; 
            color: white; 
            border: 1px solid #444;
            font-size: 16px;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            margin-top: 15px; 
            border-radius: 8px; 
            background: #e63946; 
            color: white; 
            border: none; 
            font-weight: bold; 
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #ff4d5a; transform: translateY(-2px); }
        button:active { transform: scale(0.98); }

        #result { 
            font-size: 20px; 
            margin-top: 20px; 
            min-height: 30px;
            font-weight: bold;
            color: #ffcc00;
        }

        .signature { position: fixed; bottom: 15px; color: #333; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="rinnegan-container">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="ring r4"></div>
</div>

<div class="vs-box">
    <h2>⚔️ Efsanevi Karşılaşma</h2>
    
    <select id="char1">
        <option value="0">Naruto</option>
        <option value="1">Itachi</option>
        <option value="2">Sasuke</option>
        <option value="3" selected>Pain</option>
    </select>

    <div style="font-weight: bold; color: #555; margin: 5px;">VS</div>

    <select id="char2">
        <option value="0" selected>Naruto</option>
        <option value="1">Itachi</option>
        <option value="2">Sasuke</option>
        <option value="3">Pain</option>
    </select>

    <button id="fightBtn" onclick="initiateFight()">SAVAŞI BAŞLAT</button>
    
    <div id="result">Karakterini seç ve savaş!</div>
</div>

<div class="signature">DEVELOPED BY THE ARCHITECT MUSTAFA</div>

<audio id="s-0" src="https://www.myinstants.com/media/sounds/naruto-uzumaki-dattebayo.mp3"></audio>
<audio id="s-1" src="https://www.myinstants.com/media/sounds/itachi-shisui-susanoo.mp3"></audio>
<audio id="s-2" src="https://www.myinstants.com/media/sounds/chidori-sound-effect.mp3"></audio>
<audio id="s-3" src="https://www.myinstants.com/media/sounds/shinra-tensei.mp3"></audio>

<script>
    let audioUnlocked = false;

    function initiateFight() {
        // İlk tıklamada seslerin kilidini aç
        if (!audioUnlocked) {
            for (let i = 0; i < 4; i++) {
                let s = document.getElementById("s-" + i);
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            }
            audioUnlocked = true;
        }
        fight();
    }

    function fight() {
        const c1 = document.getElementById("char1").value;
        const c2 = document.getElementById("char2").value;
        const res = document.getElementById("result");
        const names = ["Naruto 🍥", "Itachi 👁️", "Sasuke ⚡", "Pain 🌀"];

        if(c1 === c2) { 
            res.innerText = "Aynı karakterler kapışamaz!"; 
            res.style.color = "#ff4444";
            return; 
        }

        // Mevcut sesleri durdur
        for(let i=0; i<4; i++) {
            let s = document.getElementById("s-" + i);
            s.pause(); s.currentTime = 0;
        }

        res.innerText = "⚡ Çakralar çarpışıyor...";
        res.style.color = "#ffcc00";
        
        setTimeout(() => {
            // Şans faktörü
            const winnerIdx = Math.random() > 0.5 ? c1 : c2;
            res.innerText = "🔥 KAZANAN: " + names[winnerIdx];
            res.style.color = "#00ffb3";

            const sound = document.getElementById("s-" + winnerIdx);
            if(sound) {
                sound.play().catch(err => {
                    console.log("Ses oynatılamadı, tekrar dene.");
                });
            }
        }, 800);
    }
</script>

</body>
</html>
