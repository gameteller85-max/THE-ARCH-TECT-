<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect - Final Restore</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .vs-box { background: #1a1a1a; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #444; width: 85%; max-width: 400px; }
        select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-weight: bold; }
        button { background: #ff4444; color: white; border: none; cursor: pointer; }
        #result { font-size: 22px; margin-top: 15px; color: #ffcc00; }
        .signature { position: fixed; bottom: 10px; color: #444; font-size: 10px; }
    </style>
</head>
<body>

<div class="vs-box">
    <h2>⚔️ Efsanevi Karşılaşma</h2>
    <select id="char1">
        <option value="0">Naruto</option>
        <option value="1">Itachi</option>
        <option value="2">Sasuke</option>
        <option value="3" selected>Pain</option>
    </select>
    <div style="margin: 5px;">VS</div>
    <select id="char2">
        <option value="0" selected>Naruto</option>
        <option value="1">Itachi</option>
        <option value="2">Sasuke</option>
        <option value="3">Pain</option>
    </select>
    <button onclick="fight()">SAVAŞI BAŞLAT</button>
    <div id="result">Karakterini seç!</div>
</div>

<div class="signature">DEVELOPED BY THE ARCHITECT MUSTAFA</div>

<audio id="s-0" src="https://www.myinstants.com/media/sounds/naruto-uzumaki-dattebayo.mp3" preload="auto"></audio>
<audio id="s-1" src="https://www.myinstants.com/media/sounds/itachi-susanoo.mp3" preload="auto"></audio>
<audio id="s-2" src="https://www.myinstants.com/media/sounds/chidori-sound-effect.mp3" preload="auto"></audio>
<audio id="s-3" src="https://www.myinstants.com/media/sounds/shinra-tensei.mp3" preload="auto"></audio>

<script>
    function fight() {
        const c1 = document.getElementById("char1").value;
        const c2 = document.getElementById("char2").value;
        const res = document.getElementById("result");

        if(c1 === c2) { res.innerText = "Aynı karakter olmaz!"; return; }

        // Önce tüm sesleri sustur (önemli!)
        for(let i=0; i<4; i++) {
            let s = document.getElementById("s-" + i);
            s.pause(); s.currentTime = 0;
        }

        res.innerText = "⚡ Çakralar çarpışıyor...";
        
        setTimeout(() => {
            const winnerIdx = Math.random() > 0.5 ? c1 : c2;
            const names = ["Naruto", "Itachi", "Sasuke", "Pain"];
            
            res.innerText = "🔥 Kazanan: " + names[winnerIdx];

            const sound = document.getElementById("s-" + winnerIdx);
            if(sound) {
                sound.play().catch(e => {
                    res.innerText = "Lütfen ekrana bir kez dokun!";
                });
            }
        }, 800);
    }
</script>
</body>
</html>
