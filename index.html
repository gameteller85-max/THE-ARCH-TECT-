<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect - Mastery Edition v4.2</title>
</head>
<body>

<div id="rinnegan-bg"></div>
<div id="quote-box"></div>

<div class="vs-box">
    <h2>⚔️ Efsanevi Karşılaşma</h2>
    <div class="selection-area">
        <select id="char1"></select>
        <span style="color: white; font-weight: bold; margin: 0 10px;">VS</span>
        <select id="char2"></select>
    </div>
    <br>
    <button id="fightBtn" onclick="fight()">SAVAŞ BAŞLAT</button>
    <p id="result">Karakterini seç ve savaşı başlat!</p>
</div>

<div class="signature">
    DEVELOPED BY <span class="architect-name">THE ARCHITECT MUSTAFA</span>
</div>

<audio id="sound-pain" src="https://www.myinstants.com/media/sounds/shinra-tensei.mp3" preload="auto"></audio>
<audio id="sound-itachi" src="https://www.myinstants.com/media/sounds/itachi-susanoo.mp3" preload="auto"></audio>
<audio id="sound-naruto" src="https://www.myinstants.com/media/sounds/dattebayo.mp3" preload="auto"></audio>
<audio id="sound-sasuke" src="https://www.myinstants.com/media/sounds/chidori-sound-effect.mp3" preload="auto"></audio>

<style>
    * { box-sizing: border-box; }
    body {
        background-color: #0d0d0d;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        transition: background 1.2s ease; /* Daha akışkan geçiş */
    }
    .signature { position: fixed; bottom: 20px; color: #444; font-size: 11px; letter-spacing: 2px; font-weight: bold; z-index: 10; }
    .architect-name { color: #666; transition: 0.5s; }
    .signature:hover .architect-name { color: #ff4444; text-shadow: 0 0 10px #ff4444; }
    
    #quote-box {
        position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.95); padding: 15px 40px;
        border-radius: 0 0 25px 25px; border: 2px solid #333; font-style: italic;
        font-size: 20px; font-weight: bold; z-index: 100; transition: top 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-align: center; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #quote-box.show { top: 0; }

    #rinnegan-bg {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 350vw; height: 350vh; opacity: 0; z-index: -1; transition: opacity 1.5s ease;
        background: repeating-radial-gradient(circle, #1a0d26 0%, #1a0d26 8%, #4b3d61 9%, #4b3d61 10%, #1a0d26 11%);
    }

    .vs-box { background: rgba(26, 26, 26, 0.95); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 450px; border: 1px solid #444; z-index: 10; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
    h2 { color: #fff; margin-bottom: 25px; }
    
    select { padding: 12px; background: #333; color: white; border-radius: 10px; width: 42%; border: 1px solid #555; outline: none; }
    button { background: linear-gradient(45deg, #ff4444, #cc0000); color: white; padding: 15px; border: none; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
    button:hover { transform: scale(1.02); filter: brightness(1.2); }
    
    #result { margin-top: 30px; color: #ddd; font-size: 20px; font-weight: bold; min-height: 24px; }
    .win-text { color: #ffcc00 !important; text-shadow: 0 0 20px #ffcc00; }
    
    .shake-heavy { animation: shake-heavy 0.8s; }
    @keyframes shake-heavy { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, 8px); } 50% { transform: translate(8px, -8px); } 75% { transform: translate(-5px, 5px); } }
</style>

<script>
    const characters = [
        { name: "Naruto", power: 92, speed: 88, iq: 75, quote: "Vazgeçmeyeceğim, bu benim yolum!", color: "#4d2600", sound: "sound-naruto" },
        { name: "Itachi", power: 85, speed: 92, iq: 98, quote: "Affet Sasuke, bir dahaki sefere...", color: "#260000", sound: "sound-itachi" },
        { name: "Sasuke", power: 90, speed: 90, iq: 88, quote: "Gözlerim karanlığı net görüyor.", color: "#000026", sound: "sound-sasuke" },
        { name: "Pain", power: 95, speed: 82, iq: 90, quote: "Dünya acıyı anlayacak...", color: "#1a0d26", sound: "sound-pain" }
    ];

    const s1 = document.getElementById("char1");
    const s2 = document.getElementById("char2");
    const resultEl = document.getElementById("result");
    const rinnegan = document.getElementById("rinnegan-bg");
    const quoteBox = document.getElementById("quote-box");
    const box = document.querySelector(".vs-box");

    function init() {
        s1.innerHTML = ""; s2.innerHTML = "";
        characters.forEach((char, index) => {
            s1.add(new Option(char.name, index));
            s2.add(new Option(char.name, index));
        });
        s1.selectedIndex = 3; s2.selectedIndex = 0;
    }

    function fight() {
        const val1 = parseInt(s1.value);
        const val2 = parseInt(s2.value);
        if (val1 === val2) { resultEl.innerText = "❌ Aynı karakter olmaz!"; return; }

        // --- TAM TEMİZLİK SÜRECİ ---
        rinnegan.style.opacity = "0";
        quoteBox.classList.remove("show");
        resultEl.classList.remove("win-text"); 
        box.classList.remove("shake-heavy");  
        document.body.style.background = "#0d0d0d";
        resultEl.innerText = "⚡ Çakralar çarpışıyor...";

        setTimeout(() => {
            const char1 = characters[val1];
            const char2 = characters[val2];
            
            // Güç hesaplama (IQ ve Hız çarpanları eklendi)
            const p1Score = (char1.power * 0.4) + (char1.speed * 0.2) + (char1.iq * 0.2) + (Math.random() * 25);
            const p2Score = (char2.power * 0.4) + (char2.speed * 0.2) + (char2.iq * 0.2) + (Math.random() * 25);
            
            const winner = p1Score > p2Score ? char1 : char2;

            resultEl.innerText = "🔥 Kazanan: " + winner.name;
            resultEl.classList.add("win-text");

            // --- GÖRSEL TETİKLEYİCİLER ---
            quoteBox.innerText = `"${winner.quote}"`;
            quoteBox.classList.add("show");
            document.body.style.background = winner.color;

            if (winner.name === "Pain") {
                rinnegan.style.opacity = "1";
                box.classList.add("shake-heavy");
            }

            // --- SES TETİKLEYİCİ (Gelişmiş) ---
            const sound = document.getElementById(winner.sound);
            if(sound) {
                sound.currentTime = 0;
                // Promise tabanlı ses çalma (Tarayıcı hatalarını önler)
                let playPromise = sound.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Ses çalma engellendi, etkileşim bekleniyor.");
                    });
                }
            }

            setTimeout(() => box.classList.remove("shake-heavy"), 800);
        }, 850);
    }
    init();
</script>

</body>
</html>
