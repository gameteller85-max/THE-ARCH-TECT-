<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Architect FIXED CORE</title>

<style>
:root{
  --accent:#fff;
  --p1:#111;
  --p2:#111;
}

body{
  margin:0;
  height:100vh;
  background:#000;
  color:#fff;
  font-family:monospace;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* FX */
#fx{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.ring{
  position:absolute;
  border:2px solid rgba(170,102,255,0.3);
  border-radius:50%;
  width:200px;
  height:200px;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(0.5);opacity:0.5}
  100%{transform:translate(-50%,-50%) scale(2);opacity:0}
}

.viewport{
  width:420px;
  background:#0a0a0a;
  padding:30px;
  border-radius:20px;
  border:1px solid #222;
  z-index:2;
}

.arena{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.card{
  width:45%;
  aspect-ratio:3/4;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #222;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  filter:grayscale(1);
  transition:0.4s;
}

.card.active img{
  opacity:1;
}

.card.winner{
  border-color:gold;
  transform:scale(1.05);
}

select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#111;
  color:#fff;
  border:1px solid #333;
}

button{
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}
button:disabled{
  opacity:0.3;
}
</style>
</head>

<body>

<div id="fx"></div>

<div class="viewport">
  <div class="arena">
    <div class="card" id="c1"><img id="i1"></div>
    <div class="card" id="c2"><img id="i2"></div>
  </div>

  <select id="p1"></select>
  <select id="p2"></select>

  <button id="fight">FIGHT</button>

  <p id="txt">READY</p>
</div>

<script>

const DB = {
  itachi:{p:94,img:"https://i.ibb.co/L5rK5Q8/itachi.jpg"},
  pain:{p:96,img:"https://i.ibb.co/mS7xZ8M/pain.jpg"},
  naruto:{p:88,img:"https://i.ibb.co/K2Nf6X2/naruto.jpg"},
  sasuke:{p:91,img:"https://i.ibb.co/vYm6sF4/sasuke.jpg"}
};

let state = {
  p1:"itachi",
  p2:"pain",
  busy:false
};

// preload cache
const cache = {};

function loadImg(key){
  return new Promise(res=>{
    if(cache[key]) return res(cache[key]);
    const img = new Image();
    img.src = DB[key].img;
    img.onload=()=>{
      cache[key]=img.src;
      res(img.src);
    };
    img.onerror=()=>res("");
  });
}

function render(){
  const i1=document.getElementById("i1");
  const i2=document.getElementById("i2");

  loadImg(state.p1).then(src=>{
    i1.src=src;
    document.getElementById("c1").classList.add("active");
  });

  loadImg(state.p2).then(src=>{
    i2.src=src;
    document.getElementById("c2").classList.add("active");
  });
}

function updateFX(){
  const fx=document.getElementById("fx");
  fx.innerHTML="";

  if(state.p1==="pain"||state.p2==="pain"){
    fx.innerHTML=`<div class="ring"></div>`;
  }
}

function fight(){
  if(state.busy) return;
  state.busy=true;

  const txt=document.getElementById("txt");
  txt.innerText="FIGHTING...";

  document.getElementById("c1").classList.remove("winner");
  document.getElementById("c2").classList.remove("winner");

  setTimeout(()=>{

    const a=DB[state.p1].p + Math.random()*10;
    const b=DB[state.p2].p + Math.random()*10;

    const win = a>b?0:1;

    const winKey = win===0?state.p1:state.p2;

    document.getElementById("txt").innerText="WINNER: "+winKey.toUpperCase();
    document.getElementById("txt").style.color="gold";

    document.getElementById(win===0?"c1":"c2").classList.add("winner");

    state.busy=false;

  },1200);
}

// init
function init(){
  const p1=document.getElementById("p1");
  const p2=document.getElementById("p2");

  Object.keys(DB).forEach(k=>{
    p1.innerHTML+=`<option value="${k}">${k}</option>`;
    p2.innerHTML+=`<option value="${k}">${k}</option>`;
  });

  p1.value=state.p1;
  p2.value=state.p2;

  p1.onchange=e=>{state.p1=e.target.value;render();updateFX();}
  p2.onchange=e=>{state.p2=e.target.value;render();updateFX();}

  document.getElementById("fight").onclick=fight;

  render();
  updateFX();
}

init();

</script>

</body>
</html>
